<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamar Shood Fast Food</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212; /* Midab madow oo casri ah */
            text-align: center;
            color: #ffffff;
        }
        .bismillah {
            color: #ffcc00; /* Midab dahabi ah */
            font-size: 22px;
            font-weight: bold;
            margin: 20px 0;
        }
        .welcome-section {
            background: #1e1e1e; /* Sanduuq madow oo iftiimaya */
            border: 1px solid #333333;
            border-radius: 15px;
            padding: 20px;
            margin: 15px auto;
            max-width: 90%;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        .welcome-title {
            color: #ff3333; /* Midab guduudan oo la mid ah boorkaaga */
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .welcome-text {
            color: #cccccc;
            font-size: 15px;
            line-height: 1.6;
            margin: 0;
        }
        .main-banner {
            width: 95%;
            max-width: 600px;
            height: auto;
            display: block;
            margin: 20px auto;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

    <!-- 1. Bismillah -->
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>

    <!-- 2. Qoraalka Soo Dhaweynta oo wata naqshad cusub -->
    <div class="welcome-section">
        <div class="welcome-title">✨ Dhadhan Reer Xamar ✨</div>
        <p class="welcome-text">
            Ku soo dhowaada maqaayada Hamar Shood! Waxaan maalin kasta si heersare ah kuugu diyaarinaa cuntooyinka aad jeceshahay oo leh dhadhan gaar ah iyo nadiifnimo buuxda. Booqashadaadu waa noo sharaf!
        </p>
    </div>

    <!-- 3. Boorkaaga rasmiga ah -->
    <img src="Add a heading_20260623_003800_0000.png" class="main-banner" alt="Boorka Maqaayada">

</body>
</html>
